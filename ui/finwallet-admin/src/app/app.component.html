<div class="min-h-screen">
  <header class="px-6 py-5 flex flex-wrap items-center justify-between">
    <div class="text-2xl font-semibold tracking-tight">FinWallet Admin</div>
    <div *ngIf="isLoggedIn" class="flex items-center gap-3 text-sm">
      <span class="px-3 py-1 rounded-full bg-white/70">{{ email }}</span>
      <button
        class="px-4 py-2 rounded-full bg-ink text-white hover:bg-slate transition"
        (click)="logout()"
      >
        Logout
      </button>
    </div>
  </header>

  <main class="px-6 pb-10">
    <router-outlet></router-outlet>
  </main>
</div>
