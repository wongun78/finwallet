<h2 mat-dialog-title class="text-lg font-semibold">{{ data.title }}</h2>
<div mat-dialog-content class="text-sm text-slate/80">{{ data.message }}</div>
<div mat-dialog-actions align="end" class="mt-4">
  <button mat-stroked-button (click)="cancel()">{{ data.cancelText }}</button>
  <button mat-flat-button color="primary" (click)="confirm()">{{ data.confirmText }}</button>
</div>
