name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/finwallet-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build -- --configuration production

  docker-images:
    runs-on: ubuntu-latest
    needs: [build-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/FinWallet.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/finwallet-api:latest

      - name: Build and push Admin image
        uses: docker/build-push-action@v5
        with:
          context: ui/finwallet-admin
          file: ui/finwallet-admin/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/finwallet-admin:latest
